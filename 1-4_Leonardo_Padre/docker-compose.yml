services:
  loan-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: loan-approval-api
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/app/model:ro
    environment:
      MODEL_PATH: /app/model/model.pkl
      MODEL_VERSION: "1.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  loan-front:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: loan-approval-front
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      - loan-api
    restart: unless-stopped